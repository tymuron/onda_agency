<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onda Agency</title>
    <meta name="description" content="Premium websites for service businesses that need to look established and capture more leads.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fafafa;
        }
        .loader {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader" aria-label="Loading"></div>

    <script>
        (function() {
            var LANG_KEY = 'onda_lang_override';
            var stored = localStorage.getItem(LANG_KEY);

            // If user manually selected a language before, respect it
            if (stored === 'ka') { window.location.replace('index_ka.html'); return; }
            if (stored === 'es') { window.location.replace('index_es.html'); return; }
            if (stored === 'en') { window.location.replace('index_v5.html'); return; }

            // Detect country via IP geolocation
            fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(3000) })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    var country = (data.country_code || '').toUpperCase();
                    if (country === 'GE') {
                        window.location.replace('index_ka.html');
                    } else if (country === 'ES') {
                        window.location.replace('index_es.html');
                    } else {
                        window.location.replace('index_v5.html');
                    }
                })
                .catch(function() {
                    // API failed or timed out — default to English
                    window.location.replace('index_v5.html');
                });
        })();
    </script>
</body>
</html>
